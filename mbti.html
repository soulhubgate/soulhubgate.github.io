    <script>
        const categoriesTrans = {
            "EI": { en: "Energy", ar: "الطاقة" },
            "SN": { en: "Information", ar: "المعلومات" },
            "TF": { en: "Decisions", ar: "القرارات" },
            "JP": { en: "Structure", ar: "الهيكلة" }

        const letterMeanings = {
            'E': { en: "Extraverted", ar: "منبسط" },
            'I': { en: "Introverted", ar: "انطوائي" },
            'S': { en: "Sensing", ar: "واقعي" },
            'N': { en: "Intuitive", ar: "حدسي" },
            'T': { en: "Thinking", ar: "منطقي" },
            'F': { en: "Feeling", ar: "عاطفي" },
            'J': { en: "Judging", ar: "حازم" },
            'P': { en: "Perceiving", ar: "مرن" }
        };

        const letterDescs = {
            'E': { en: "Gains energy from social interaction.", ar: "يستمد الطاقة من التفاعل الاجتماعي." },
            'I': { en: "Gains energy from alone time.", ar: "يستمد الطاقة من الوقت الفردي." },
            'S': { en: "Focuses on facts and details.", ar: "يركز على الحقائق والتفاصيل." },
            'N': { en: "Focuses on ideas and concepts.", ar: "يركز على الأفكار والمفاهيم." },
            'T': { en: "Prioritizes logic and rationality.", ar: "يعطي الأولوية للمنطق والعقلانية." },
            'F': { en: "Prioritizes values and emotions.", ar: "يعطي الأولوية للقيم والمشاعر." },
            'J': { en: "Prefers plans and structure.", ar: "يفضل الخطط والهيكلة." },
            'P': { en: "Prefers flexibility and spontaneity.", ar: "يفضل المرونة والعفوية." }
        };

        // 60 Questions (15 per dimension pair)
        // Scoring: 
        // EI: High = Extraversion (E), Low = Introversion (I)
        // SN: High = Intuition (N), Low = Sensing (S) -- Convention: N usually higher? Let's say 1=S, 5=N
        // TF: High = Thinking (T), Low = Feeling (F) -- Or 1=F, 5=T? Let's define explicitly.
        // JP: High = Judging (J), Low = Perceiving (P) -- Let's say 1=P, 5=J

        // Revised Logic: 
        // We track 4 scores.
        // E_score (High=E)
        // N_score (High=N)
        // T_score (High=T)
        // J_score (High=J)

        const questions = [
            // E vs I (High score = Extravert)
            { category: "EI", text: { en: "I feel energized after being out with friends.", ar: "أشعر بالنشاط بعد الخروج مع الأصدقاء." } },
            { category: "EI", text: { en: "I usually start conversations.", ar: "عادة أنا من يبدأ المحادثات." } },
            { category: "EI", text: { en: "I enjoy meeting new people.", ar: "أستمتع بمقابلة أشخاص جدد." } },
            { category: "EI", text: { en: "I act before I think.", ar: "أتصرف قبل أن أفكر." } },
            { category: "EI", text: { en: "I am often the center of attention.", ar: "غالباً ما أكون محط الأنظار." } },
            { category: "EI", text: { en: "I have a wide circle of acquaintances.", ar: "لدي دائرة واسعة من المعارف." } },
            { category: "EI", text: { en: "I speak up in meetings.", ar: "أتحدث بصراحة في الاجتماعات." } },
            { category: "EI", text: { en: "I prefer working in a bustling environment.", ar: "أفضل العمل في بيئة مزدحمة." } },
            { category: "EI", text: { en: "I feel lonely when not with people.", ar: "أشعر بالوحدة عندما لا أكون مع الناس." } },
            { category: "EI", text: { en: "I am perceived as energetic.", ar: "ينظر إليّ على أنني مفعم بالحيوية." } }, // 10
            { category: "EI", text: { en: "I prefer a quiet evening alone. (Reverse)", ar: "أفضل أمسية هادئة بمفردي. (عكسي)" }, reverse: true },
            { category: "EI", text: { en: "I wait for others to introduce themselves. (Reverse)", ar: "أنتظر الآخرين لتقديم أنفسهم. (عكسي)" }, reverse: true },
            { category: "EI", text: { en: "I find large groups exhausting. (Reverse)", ar: "أجد المجموعات الكبيرة مرهقة. (عكسي)" }, reverse: true },
            { category: "EI", text: { en: "I think before I speak. (Reverse)", ar: "أفكر قبل أن أتحدث. (عكسي)" }, reverse: true },
            { category: "EI", text: { en: "I am a private person. (Reverse)", ar: "أنا شخص كتوم. (عكسي)" }, reverse: true },

            // N vs S (High score = Intuitive)
            { category: "SN", text: { en: "I focus on the big picture rather than details.", ar: "أركز على الصورة الكبيرة بدلاً من التفاصيل." } },
            { category: "SN", text: { en: "I love exploring abstract theories.", ar: "أحب استكشاف النظريات المجردة." } },
            { category: "SN", text: { en: "I trust my gut/hunch.", ar: "أثق في حدسي." } },
            { category: "SN", text: { en: "I often think about the future.", ar: "غالباً ما أفكر في المستقبل." } },
            { category: "SN", text: { en: "I value imagination over reality.", ar: "أقدر الخيال أكثر من الواقع." } },
            { category: "SN", text: { en: "I see patterns where others see random facts.", ar: "أرى أنماطاً حيث يرى الآخرون حقائق عشوائية." } },
            { category: "SN", text: { en: "I speak in metaphors.", ar: "أتحدث بالاستعارات المجازية." } },
            { category: "SN", text: { en: "I get bored with routine details.", ar: "أشعر بالملل من التفاصيل الروتينية." } },
            { category: "SN", text: { en: "I wonder 'what if' constantly.", ar: "أتساءل 'ماذا لو' باستمرار." } },
            { category: "SN", text: { en: "I am intrigued by the unknown.", ar: "أنا مفتون بالمجهول." } }, // 10
            { category: "SN", text: { en: "I trust facts and experience. (Reverse)", ar: "أثق في الحقائق والخبارات. (عكسي)" }, reverse: true },
            { category: "SN", text: { en: "I pay attention to the present moment. (Reverse)", ar: "أنتبه للحظة الحالية. (عكسي)" }, reverse: true },
            { category: "SN", text: { en: "I prefer clear instructions. (Reverse)", ar: "أفضل التعليمات الواضحة. (عكسي)" }, reverse: true },
            { category: "SN", text: { en: "I am practical and pragmatic. (Reverse)", ar: "أنا عملي وواقعي. (عكسي)" }, reverse: true },
            { category: "SN", text: { en: "I remember specific details clearly. (Reverse)", ar: "أتذكر تفاصيل محددة بوضوح. (عكسي)" }, reverse: true },

            // T vs F (High score = Thinking)
            { category: "TF", text: { en: "I value logic over feelings.", ar: "أقدر المنطق أكثر من المشاعر." } },
            { category: "TF", text: { en: "I am often described as 'tough-minded'.", ar: "غالباً ما أوصف بأنني 'صارم العقلية'." } },
            { category: "TF", text: { en: "I criticize constructively.", ar: "أنتقد بشكل بناء." } },
            { category: "TF", text: { en: "I make decisions based on objective criteria.", ar: "أتخذ القرارات بناءً على معايير موضوعية." } },
            { category: "TF", text: { en: "I can stay detached in emotional situations.", ar: "أستطيع البقاء منفصلاً في المواقف العاطفية." } },
            { category: "TF", text: { en: "I debate to find the truth.", ar: "أناقش للوصول إلى الحقيقة." } },
            { category: "TF", text: { en: "I prioritize efficiency over harmony.", ar: "أعطي الأولوية للكفاءة على الانسجام." } },
            { category: "TF", text: { en: "I am honest even if it hurts.", ar: "أنا صادق حتى لو كان ذلك مؤلماً." } },
            { category: "TF", text: { en: "I analyze problems systematically.", ar: "أحلل المشاكل بشكل منهجي." } },
            { category: "TF", text: { en: "I am skeptical.", ar: "أنا متشكك." } }, // 10
            { category: "TF", text: { en: "I follow my heart. (Reverse)", ar: "أتبع قلبي. (عكسي)" }, reverse: true },
            { category: "TF", text: { en: "I care deeply about people's feelings. (Reverse)", ar: "أهتم كثيراً بمشاعر الناس. (عكسي)" }, reverse: true },
            { category: "TF", text: { en: "I try to keep the peace. (Reverse)", ar: "أحاول الحفاظ على السلام. (عكسي)" }, reverse: true },
            { category: "TF", text: { en: "I take things personally. (Reverse)", ar: "آخذ الأمور بشكل شخصي. (عكسي)" }, reverse: true },
            { category: "TF", text: { en: "I make decisions based on values. (Reverse)", ar: "أتخذ القرارات بناءً على القيم. (عكسي)" }, reverse: true },

            // J vs P (High score = Judging)
            { category: "JP", text: { en: "I like to have a plan.", ar: "أحب أن يكون لدي خطة." } },
            { category: "JP", text: { en: "I finish work before playing.", ar: "أنهي العمل قبل اللعب." } },
            { category: "JP", text: { en: "I keep my space organized.", ar: "أحافظ على مساحتي منظمة." } },
            { category: "JP", text: { en: "I dislike last-minute changes.", ar: "أكره تغييرات اللحظة الأخيرة." } },
            { category: "JP", text: { en: "I make to-do lists.", ar: "أضع قوائم للمهام." } },
            { category: "JP", text: { en: "I prefer closure.", ar: "أفضل حسم الأمور." } },
            { category: "JP", text: { en: "I am punctual.", ar: "أنا دقيق في المواعيد." } },
            { category: "JP", text: { en: "I follow rules.", ar: "أتبع القواعد." } },
            { category: "JP", text: { en: "I like clear deadlines.", ar: "أحب المواعيد النهائية الواضحة." } },
            { category: "JP", text: { en: "I prepare in advance.", ar: "أستعد مسبقاً." } }, // 10
            { category: "JP", text: { en: "I leave things open-ended. (Reverse)", ar: "أترك الأمور مفتوحة. (عكسي)" }, reverse: true },
            { category: "JP", text: { en: "I am spontaneous. (Reverse)", ar: "أنا عفوي. (عكسي)" }, reverse: true },
            { category: "JP", text: { en: "I keep my options open. (Reverse)", ar: "أبقي خياراتي مفتوحة. (عكسي)" }, reverse: true },
            { category: "JP", text: { en: "I start projects at the last minute. (Reverse)", ar: "أبدأ المشاريع في اللحظة الأخيرة. (عكسي)" }, reverse: true },
            { category: "JP", text: { en: "I am messy/disorganized. (Reverse)", ar: "أنا فوضوي/غير منظم. (عكسي)" }, reverse: true }
        ];

        let scores = { "EI": 0, "SN": 0, "TF": 0, "JP": 0 };
        let currentQuestionIndex = 0;
        let shuffledQuestions = [];
        let answerHistory = [];

        function init() {
            window.handleLanguageChange = (lang) => {
                currentLang = lang;
                updateText();
                if (currentQuestionIndex < 60) renderQuestion();
                else showResult();
            };
            shuffleArray(questions);
            shuffledQuestions = questions;
        }

        function updateText() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) el.innerHTML = translations[currentLang][key];
            });
        }

        function startQuiz() {
            document.getElementById('page-home').classList.add('hidden');
            document.getElementById('page-quiz').classList.remove('hidden');
            scores = { "EI": 0, "SN": 0, "TF": 0, "JP": 0 };
            currentQuestionIndex = 0;
            renderOptions();
            renderQuestion();
        }

        function renderOptions() {
            const container = document.getElementById('options-container');
            const labels = [1, 2, 3, 4, 5];
            const t = translations[currentLang];
            const textLabels = [t.option_1, t.option_2, t.option_3, t.option_4, t.option_5];

            container.innerHTML = labels.map((val, idx) => `
                <button onclick="handleAnswer(${val})" class="btn-option w-full p-4 rounded-xl bg-slate-800/50 border border-slate-700 hover:border-emerald-500 text-start flex items-center group transition-all">
                    <span class="w-8 h-8 rounded-full border-2 border-slate-600 group-hover:border-emerald-500 me-4 flex items-center justify-center text-xs text-slate-500 group-hover:text-emerald-500 font-bold">${val}</span>
                    <span class="text-slate-300 group-hover:text-white font-medium">${textLabels[idx]}</span>
                </button>
            `).join('');
        }

        function renderQuestion() {
            const q = shuffledQuestions[currentQuestionIndex];
            const catName = categoriesTrans[q.category][currentLang];
            document.getElementById('question-category').innerText = catName;
            document.getElementById('question-text').innerText = q.text[currentLang];

            const progress = ((currentQuestionIndex) / 60) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('question-tracker').innerText = `${currentQuestionIndex + 1} / 60`;

            if (currentQuestionIndex > 0) document.getElementById('btn-back').classList.remove('hidden');
            else document.getElementById('btn-back').classList.add('hidden');
        }

        function handleAnswer(val) {
            const q = shuffledQuestions[currentQuestionIndex];
            let score = val;
            if (q.reverse) score = 6 - val;

            scores[q.category] += score;
            answerHistory.push(score);

            currentQuestionIndex++;
            if (currentQuestionIndex < 60) renderQuestion();
            else showResult();
        }

        function goBack() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                const lastScore = answerHistory.pop();
                const q = shuffledQuestions[currentQuestionIndex];
                scores[q.category] -= lastScore;
                renderQuestion();
            }
        }

        function showResult() {
            document.getElementById('page-quiz').classList.add('hidden');
            document.getElementById('page-result').classList.remove('hidden');

            // Calculate Type
            // Max score per dim is 15 items * 5 = 75. 
            // Midpoint is 15 * 3 = 45.
            // > 45 = Right side (E, N, T, J)
            // <= 45 = Left side (I, S, F, P)

            const type = [
                scores.EI > 45 ? 'E' : 'I',
                scores.SN > 45 ? 'N' : 'S',
                scores.TF > 45 ? 'T' : 'F',
                scores.JP > 45 ? 'J' : 'P'
            ].join('');

            document.getElementById('result-type').innerText = type;

            // NEW: Render detailed letter breakdown
            const lettersDiv = document.getElementById('result-letters');
            lettersDiv.innerHTML = type.split('').map(char => {
                const meaning = letterMeanings[char][currentLang];
                const desc = letterDescs[char][currentLang];
                return `
                    <div class="bg-indigo-900/30 border border-indigo-500/30 px-4 py-3 rounded-xl flex flex-col items-center min-w-[120px]">
                        <span class="text-2xl font-bold text-emerald-400 mb-1">${char}</span>
                        <span class="text-white font-bold text-sm mb-1">${meaning}</span>
                        <span class="text-xs text-slate-400 max-w-[150px]">${desc}</span>
                    </div>
                `;
            }).join('');

            const breakdown = document.getElementById('result-breakdown');
            breakdown.innerHTML = `
                ${makeBar(letterMeanings[scores.EI > 45 ? 'E' : 'I'][currentLang], scores.EI)}
                ${makeBar(letterMeanings[scores.SN > 45 ? 'N' : 'S'][currentLang], scores.SN)}
                ${makeBar(letterMeanings[scores.TF > 45 ? 'T' : 'F'][currentLang], scores.TF)}
                ${makeBar(letterMeanings[scores.JP > 45 ? 'J' : 'P'][currentLang], scores.JP)}
            `;

            const descKey = `mbti_${type}_desc`;
            // Simplified dynamic description fallback
            const desc = translations[currentLang][descKey] || (currentLang === 'ar' ? "تحليل شخصيتك جاهز اقرأ المزيد في المكتبة." : "Your full personality profile is ready. Read more in our library.");
            document.getElementById('result-description').innerText = desc;
        }

        function makeBar(label, score) {
            const pct = Math.round((score / 75) * 100);
            return `
             <div class="bg-slate-700/50 p-4 rounded-xl flex flex-col items-center">
                <span class="text-xs text-slate-400 font-bold mb-2">${label}</span>
                <div class="w-full h-32 bg-slate-800 rounded-full relative overflow-hidden flex items-end justify-center">
                    <div class="w-full bg-gradient-to-t from-emerald-600 to-teal-400 transition-all duration-1000" style="height: ${pct}%"></div>
                </div>
                <span class="text-sm font-bold text-white mt-2">${pct}%</span>
            </div>
            `;
        }

        function shareResult(platform) {
            const type = document.getElementById('result-type').innerText;
            const url = encodeURIComponent(window.location.href);
            const text = currentLang === 'en' ? `I am an ${type}! Check your personality type on Soul-Hub:` : `أنا نمطي هو ${type}! اكتشف نمط شخصيتك على Soul-Hub:`;
            let shareUrl = '';
            if (platform === 'wa') shareUrl = `https://api.whatsapp.com/send?text=${text} ${url}`;
            window.open(shareUrl, '_blank');
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        init();
    </script>
</body>


</html>
