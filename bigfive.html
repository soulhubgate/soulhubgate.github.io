    <meta charset="UTF-8">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
        }

        html[lang="ar"] body {
            font-family: 'Cairo', sans-serif;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        @keyframes blob {
            0% {
                transform: translate(0px, 0px) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }

            100% {
                transform: translate(0px, 0px) scale(1);
            }
        }

        .animate-blob {
            animation: blob 7s infinite;
        }

        .animation-delay-2000 {
            animation-delay: 2s;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0f172a;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body
    class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900">
    <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P7SC53BR"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

    <div id="app-container"
        class="w-full max-w-5xl glass-panel rounded-2xl flex flex-col relative overflow-hidden h-[90vh]">
        <div
            class="absolute top-0 left-0 w-32 h-32 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-blob pointer-events-none">
        </div>
        <div
            class="absolute top-0 right-0 w-32 h-32 bg-cyan-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-blob animation-delay-2000 pointer-events-none">
        </div>

        <div id="nav-placeholder"></div>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-6 md:p-10 relative">

            <!-- Intro View -->
            <div id="page-home" class="text-center mt-12 fade-in">
                <div class="mb-6 inline-block p-4 rounded-full bg-blue-500/20 text-blue-300">
                    <i class="fas fa-fingerprint text-5xl"></i>
                </div>
                <h1 class="text-4xl md:text-5xl font-extrabold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-300 to-cyan-300"
                    data-i18n="card_bigfive_title">
                    Big Five Personality Traits
                </h1>
                <p class="text-lg text-slate-300 mb-10 max-w-lg mx-auto leading-relaxed" data-i18n="card_bigfive_desc">
                    The scientific gold standard for personality assessment. Measures Openness, Conscientiousness,
                    Extraversion, Agreeableness, and Neuroticism.
                </p>
                <button onclick="startQuiz()"
                    class="px-8 py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl shadow-lg shadow-blue-500/30 transition-all transform hover:scale-105"
                    data-i18n="btn_start">
                    Begin Assessment
                </button>
            </div>

            <!-- Quiz View -->
            <div id="page-quiz" class="hidden fade-in max-w-2xl mx-auto mt-4">
                <div class="flex justify-between text-xs text-slate-400 mb-2 uppercase tracking-wide">
                    <span data-i18n="progress">Progress</span>
                    <span id="question-tracker">1 / 50</span>
                </div>
                <div class="w-full bg-slate-700 h-2 rounded-full mb-8 overflow-hidden">
                    <div id="progress-bar"
                        class="bg-gradient-to-r from-blue-500 to-cyan-500 h-2 rounded-full transition-all duration-300"
                        style="width: 0%"></div>
                </div>

                <div class="mb-2 text-center">
                    <span id="question-category"
                        class="text-xs font-bold text-blue-400 tracking-widest uppercase bg-blue-900/30 px-3 py-1 rounded-full">Trait</span>
                </div>

                <h2 id="question-text"
                    class="text-2xl md:text-3xl font-bold text-white text-center mb-10 min-h-[100px] flex items-center justify-center">
                    Loading...
                </h2>

                <div id="options-container" class="space-y-3">
                    <!-- Injected by JS -->
                </div>

                <div class="flex justify-between mt-8">
                    <button id="btn-back" onclick="goBack()"
                        class="px-6 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-slate-300 text-sm hidden"
                        data-i18n="btn_back">
                        <i class="fas fa-arrow-left mr-2 rtl:rotate-180"></i> Back
                    </button>
                </div>
            </div>

            <!-- Result View -->
            <div id="page-result" class="hidden fade-in w-full">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">

                    <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700">
                        <h2 class="text-2xl font-bold text-white mb-6 flex items-center gap-3">
                            <i class="fas fa-chart-pie text-blue-400"></i> Your Trait Profile
                        </h2>
                        <canvas id="radarChart" class="w-full max-h-[400px]"></canvas>

                        <div class="mt-6 flex gap-4">
                            <button onclick="shareResult('wa')"
                                class="flex-1 py-3 bg-green-600 hover:bg-green-500 rounded-xl text-white font-bold transition-all">
                                <i class="fab fa-whatsapp"></i> WhatsApp
                            </button>
                            <button onclick="shareResult('tw')"
                                class="flex-1 py-3 bg-sky-500 hover:bg-sky-400 rounded-xl text-white font-bold transition-all">
                                <i class="fab fa-twitter"></i> Twitter
                            </button>
                        </div>
                    </div>

                    <div class="space-y-6">
                        <div class="bg-slate-800/30 p-6 rounded-xl border border-slate-700/50">
                            <h3 class="text-xl font-bold text-white mb-4">Detailed Breakdown</h3>
                            <div id="stats-grid" class="space-y-4">
                                <!-- Stats injected here -->
                            </div>
                        </div>

                        <div class="flex flex-col gap-4">
                            <a href="blog.html"
                                class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl text-center shadow-lg shadow-indigo-500/20 transition-all">
                                Read Full Analysis in Library
                            </a>
                            <button onclick="location.reload()"
                                class="w-full py-4 bg-slate-700 hover:bg-slate-600 text-slate-200 font-bold rounded-xl transition-all">
                                Retake Test
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="js/translations.js"></script>
    <script src="js/main.js"></script>
    <script>
        // 50 Questions (10 per trait)
        // Traits: O (Openness), C (Conscientiousness), E (Extraversion), A (Agreeableness), N (Neuroticism)
        // Based on IPIP items (simplified)

        const categoriesTrans = {
            "O": { en: "Openness", ar: "الانفتاح" },
            "C": { en: "Conscientiousness", ar: "الضمير الحي" },
            "E": { en: "Extraversion", ar: "الانبساط" },
            "A": { en: "Agreeableness", ar: "الوداعة" },
            "N": { en: "Neuroticism", ar: "العصابية" }
        };

        const questions = [
            // Extraversion (E)
            { category: "E", text: { en: "I am the life of the party.", ar: "أنا روح الحفلة." } },
            { category: "E", text: { en: "I feel comfortable around people.", ar: "أشعر بالراحة حول الناس." } },
            { category: "E", text: { en: "I start conversations.", ar: "أنا من يبدأ المحادثات." } },
            { category: "E", text: { en: "I talk to a lot of different people at parties.", ar: "أتحدث مع الكثير من الناس المختلفين في الحفلات." } },
            { category: "E", text: { en: "I don't mind being the center of attention.", ar: "لا أمانع أن أكون محط الأنظار." } },
            { category: "E", text: { en: "I am quiet around strangers. (Reverse)", ar: "أنا هادئ حول الغرباء. (عكسي)" }, reverse: true },
            { category: "E", text: { en: "I don't like to draw attention to myself. (Reverse)", ar: "لا أحب لفت الانتباه إلى نفسي. (عكسي)" }, reverse: true },
            { category: "E", text: { en: "I don't talk a lot. (Reverse)", ar: "لا أتحدث كثيراً. (عكسي)" }, reverse: true },
            { category: "E", text: { en: "I keep in the background. (Reverse)", ar: "أبقى في الخلفية. (عكسي)" }, reverse: true },
            { category: "E", text: { en: "I have little to say. (Reverse)", ar: "ليس لدي الكثير لأقوله. (عكسي)" }, reverse: true },

            // Agreeableness (A)
            { category: "A", text: { en: "I sympathize with others' feelings.", ar: "أتعاطف مع مشاعر الآخرين." } },
            { category: "A", text: { en: "I have a soft heart.", ar: "قلبي رقيق." } },
            { category: "A", text: { en: "I take time out for others.", ar: "أقتطع وقتاً من أجلي للآخرين." } },
            { category: "A", text: { en: "I feel others' emotions.", ar: "أشعر بمشاعر الآخرين." } },
            { category: "A", text: { en: "I make people feel at ease.", ar: "أجعل الناس يشعرون بالراحة." } },
            { category: "A", text: { en: "I am not interested in other people's problems. (Reverse)", ar: "لست مهتماً بمشاكل الآخرين. (عكسي)" }, reverse: true },
            { category: "A", text: { en: "I feel little concern for others. (Reverse)", ar: "لا أشعر باهتمام كبير للآخرين. (عكسي)" }, reverse: true },
            { category: "A", text: { en: "I insult people. (Reverse)", ar: "أهين الناس. (عكسي)" }, reverse: true },
            { category: "A", text: { en: "I am not interested in others. (Reverse)", ar: "لست مهتماً بالآخرين. (عكسي)" }, reverse: true },
            { category: "A", text: { en: "I am hard to get to know. (Reverse)", ar: "من الصعب التعرف علي. (عكسي)" }, reverse: true }, // Actually introversion? Often mapped to A in IPIP

            // Conscientiousness (C)
            { category: "C", text: { en: "I am always prepared.", ar: "أنا مستعد دائماً." } },
            { category: "C", text: { en: "I pay attention to details.", ar: "أنتبه للتفاصيل." } },
            { category: "C", text: { en: "I get chores done right away.", ar: "أنجز الأعمال المنزلية فوراً." } },
            { category: "C", text: { en: "I like order.", ar: "أحب النظام." } },
            { category: "C", text: { en: "I follow a schedule.", ar: "أتبع جدولاً زمنياً." } },
            { category: "C", text: { en: "I leave my belongings around. (Reverse)", ar: "أترك أغراضي مبعثرة. (عكسي)" }, reverse: true },
            { category: "C", text: { en: "I make a mess of things. (Reverse)", ar: "أحدث فوضى في الأشياء. (عكسي)" }, reverse: true },
            { category: "C", text: { en: "I often forget to put things back in their proper place. (Reverse)", ar: "غالباً ما أنسى إعادة الأشياء إلى مكانها الصحيح. (عكسي)" }, reverse: true },
            { category: "C", text: { en: "I shirk my duties. (Reverse)", ar: "أتهرب من واجباتي. (عكسي)" }, reverse: true },
            { category: "C", text: { en: "I neglect my duties. (Reverse)", ar: "أهمل واجباتي. (عكسي)" }, reverse: true },

            // Neuroticism (N)
            { category: "N", text: { en: "I get stressed out easily.", ar: "أشعر بالتوتر بسهولة." } },
            { category: "N", text: { en: "I worry about things.", ar: "أقلق بشأن الأشياء." } },
            { category: "N", text: { en: "I am easily disturbed.", ar: "من السهل إزعاجي." } },
            { category: "N", text: { en: "I get upset easily.", ar: "أنزعج بسهولة." } },
            { category: "N", text: { en: "I change my mood a lot.", ar: "يتغير مزاجي كثيراً." } },
            { category: "N", text: { en: "I have frequent mood swings.", ar: "لدي تقلبات مزاجية متكررة." } },
            { category: "N", text: { en: "I get irritated easily.", ar: "أغضب بسهولة." } },
            { category: "N", text: { en: "I often feel blue.", ar: "غالباً ما أشعر بالحزن." } },
            { category: "N", text: { en: "I feel threatened easily.", ar: "أشعر بالتهديد بسهولة." } },
            { category: "N", text: { en: "I remain calm under pressure. (Reverse)", ar: "أبقى هادئاً تحت الضغط. (عكسي)" }, reverse: true }, // Actually emotional stability

            // Openness (O)
            { category: "O", text: { en: "I have a rich vocabulary.", ar: "لدي مفردات ثرية." } },
            { category: "O", text: { en: "I have a vivid imagination.", ar: "لدي خيال واسع." } },
            { category: "O", text: { en: "I have excellent ideas.", ar: "لدي أفكار ممتازة." } },
            { category: "O", text: { en: "I am quick to understand things.", ar: "سريع الفهم." } },
            { category: "O", text: { en: "I use difficult words.", ar: "أستخدم كلمات صعبة." } },
            { category: "O", text: { en: "I spend time reflecting on things.", ar: "أقضي وقتاً في التأمل في الأشياء." } },
            { category: "O", text: { en: "I am full of ideas.", ar: "أنا مليء بالأفكار." } },
            { category: "O", text: { en: "I am not interested in abstract ideas. (Reverse)", ar: "لست مهتماً بالأفكار المجردة. (عكسي)" }, reverse: true },
            { category: "O", text: { en: "I do not have a good imagination. (Reverse)", ar: "ليس لدي خيال جيد. (عكسي)" }, reverse: true },
            { category: "O", text: { en: "I have difficulty understanding abstract ideas. (Reverse)", ar: "أجد صعوبة في فهم الأفكار المجردة. (عكسي)" }, reverse: true }
        ];

        let scores = { "O": 0, "C": 0, "E": 0, "A": 0, "N": 0 };
        let currentQuestionIndex = 0;
        let shuffledQuestions = [];
        let answerHistory = [];

        function init() {
            // Setup lang stuff
            window.handleLanguageChange = (lang) => {
                currentLang = lang;
                updateText();
                if (currentQuestionIndex < 50) renderQuestion();
                else renderChart();
            };
            shuffleArray(questions); // Shuffle once
            shuffledQuestions = questions; // Or create copy
        }

        function updateText() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) el.innerHTML = translations[currentLang][key];
            });
        }

        function startQuiz() {
            document.getElementById('page-home').classList.add('hidden');
            document.getElementById('page-quiz').classList.remove('hidden');
            scores = { "O": 0, "C": 0, "E": 0, "A": 0, "N": 0 };
            currentQuestionIndex = 0;
            renderOptions();
            renderQuestion();
        }

        function renderOptions() {
            const container = document.getElementById('options-container');
            const labels = [1, 2, 3, 4, 5];
            const t = translations[currentLang];
            // Re-using clinical labels for now as they fit (Disagree -> Agree)
            const textLabels = [t.option_1, t.option_2, t.option_3, t.option_4, t.option_5];

            container.innerHTML = labels.map((val, idx) => `
                <button onclick="handleAnswer(${val})" class="btn-option w-full p-4 rounded-xl bg-slate-800/50 border border-slate-700 hover:border-blue-500 text-start flex items-center group transition-all">
                    <span class="w-8 h-8 rounded-full border-2 border-slate-600 group-hover:border-blue-500 me-4 flex items-center justify-center text-xs text-slate-500 group-hover:text-blue-500 font-bold">${val}</span>
                    <span class="text-slate-300 group-hover:text-white font-medium">${textLabels[idx]}</span>
                </button>
            `).join('');
        }

        function renderQuestion() {
            const q = shuffledQuestions[currentQuestionIndex];
            const catName = categoriesTrans[q.category][currentLang];
            document.getElementById('question-category').innerText = catName;
            document.getElementById('question-text').innerText = q.text[currentLang];

            const progress = ((currentQuestionIndex) / 50) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('question-tracker').innerText = `${currentQuestionIndex + 1} / 50`;

            // Show/Hide Back Button
            if (currentQuestionIndex > 0) document.getElementById('btn-back').classList.remove('hidden');
            else document.getElementById('btn-back').classList.add('hidden');
        }

        function handleAnswer(val) {
            const q = shuffledQuestions[currentQuestionIndex];
            let score = val;
            if (q.reverse) score = 6 - val; // Reverse score (5->1, 1->5)

            scores[q.category] += score;
            answerHistory.push(score); // Store ACTUAL score added

            currentQuestionIndex++;
            if (currentQuestionIndex < 50) renderQuestion();
            else showResult();
        }

        function goBack() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                const lastScore = answerHistory.pop();
                const q = shuffledQuestions[currentQuestionIndex];
                scores[q.category] -= lastScore;
                renderQuestion();
            }
        }

        function showResult() {
            document.getElementById('page-quiz').classList.add('hidden');
            document.getElementById('page-result').classList.remove('hidden');
            renderChart();
        }

        function renderChart() {
            const ctx = document.getElementById('radarChart').getContext('2d');
            const labels = Object.keys(scores).map(k => categoriesTrans[k][currentLang]);
            // Max score per trait is 10 * 5 = 50. Normalize to 100
            const data = Object.keys(scores).map(k => (scores[k] / 50) * 100);

            if (window.myRadarChart) window.myRadarChart.destroy();
            const fontFamily = currentLang === 'ar' ? "'Cairo', sans-serif" : "'Inter', sans-serif";

            window.myRadarChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: currentLang === 'en' ? 'Percentile' : 'النسبة المئوية',
                        data: data,
                        backgroundColor: 'rgba(59, 130, 246, 0.4)',
                        borderColor: '#3b82f6',
                        pointBackgroundColor: '#fff',
                        borderWidth: 2
                    }]
                },
                options: {
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255,255,255,0.1)' },
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            pointLabels: { color: '#cbd5e1', font: { size: 12, family: fontFamily } },
                            ticks: { display: false, max: 100, min: 0 }
                        }
                    },
                    plugins: { legend: { labels: { font: { family: fontFamily } } } }
                }
            });

            // Render stats grid
            const statsGrid = document.getElementById('stats-grid');
            statsGrid.innerHTML = Object.keys(scores).map(k => {
                const pct = Math.round((scores[k] / 50) * 100);
                const name = categoriesTrans[k][currentLang];
                return `
                 <div class="flex items-center justify-between group">
                    <span class="text-sm font-semibold text-slate-300 w-32 truncate">${name}</span>
                    <div class="flex-1 mx-3 h-2 bg-slate-700 rounded-full overflow-hidden">
                        <div class="h-full rounded-full bg-blue-500" style="width: ${pct}%"></div>
                    </div>
                    <span class="text-sm font-bold text-white w-10 text-end">${pct}%</span>
                </div>
                `;
            }).join('');
        }

        function shareResult(platform) {
            const url = encodeURIComponent(window.location.href);
            const text = currentLang === 'en' ? "My Big Five Personality Result:" : "نتيجتي في اختبار السمات الخمس:";
            let shareUrl = '';
            if (platform === 'wa') shareUrl = `https://api.whatsapp.com/send?text=${text} ${url}`;
            if (platform === 'tw') shareUrl = `https://twitter.com/intent/tweet?text=${text}&url=${url}`;
            window.open(shareUrl, '_blank');
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        init();
    </script>
</body>


</html>
