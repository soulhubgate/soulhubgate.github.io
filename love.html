    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
        }

        html[lang="ar"] body {
            font-family: 'Cairo', sans-serif;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        @keyframes blob {
            0% {
                transform: translate(0px, 0px) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }

            100% {
                transform: translate(0px, 0px) scale(1);
            }
        }

        .animate-blob {
            animation: blob 7s infinite;
        }

        .animation-delay-2000 {
            animation-delay: 2s;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0f172a;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

<body
    class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-900 via-pink-900 to-slate-900">

    <div id="app-container"
        class="w-full max-w-5xl glass-panel rounded-2xl flex flex-col relative overflow-hidden h-[90vh]">
        <div
            class="absolute top-0 left-0 w-32 h-32 bg-pink-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-blob pointer-events-none">
        </div>
        <div
            class="absolute top-0 right-0 w-32 h-32 bg-rose-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-blob animation-delay-2000 pointer-events-none">
        </div>

        <div id="nav-placeholder"></div>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-6 md:p-10 relative">

            <div id="page-home" class="text-center mt-12 fade-in">
                <div class="mb-6 inline-block p-4 rounded-full bg-pink-500/20 text-pink-300">
                    <i class="fas fa-heart text-5xl"></i>
                </div>
                <h1 class="text-4xl md:text-5xl font-extrabold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-pink-300 to-rose-300"

                    Love Styles Test
                </h1>
                <p class="text-lg text-slate-300 mb-10 max-w-lg mx-auto leading-relaxed" data-i18n="card_love_desc">

                <button onclick="startQuiz()"

                <div class="w-full bg-slate-700 h-2 rounded-full mb-8 overflow-hidden">

                        class="bg-gradient-to-r from-pink-500 to-rose-500 h-2 rounded-full transition-all duration-300"

                <div class="mb-2 text-center">

                            <i class="fas fa-heart text-pink-400"></i> Your Love Profile

                        <div class="mt-6 flex gap-4">
                            <button onclick="shareResult('wa')"
                                class="flex-1 py-3 bg-green-600 hover:bg-green-500 rounded-xl text-white font-bold transition-all"><i

                        <div class="flex flex-col gap-4">
                            <div class="bg-pink-900/20 border border-pink-500/30 p-4 rounded-xl text-pink-200 text-sm">

    <script src="js/translations.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Dimensions: Words, Acts, Gifts, Time, Touch

        const categoriesTrans = {
            "Words": { en: "Words of Affirmation", ar: "كلمات التقدير" },
            "Acts": { en: "Acts of Service", ar: "أعمال الخدمة" },
            "Gifts": { en: "Receiving Gifts", ar: "تلقي الهدايا" },
            "Time": { en: "Quality Time", ar: "الوقت النوعي" },
            "Touch": { en: "Physical Touch", ar: "الاتصال الجسدي" }
        };

        // 50 Questions (10 per category)
        const questions = [
            // Words of Affirmation
            { category: "Words", text: { en: "I feel loved when my partner tells me they appreciate me.", ar: "أشعر بالحب عندما يخبرني شريكي بأنه يقدرني." } },
            { category: "Words", text: { en: "I like receiving random texts of affection.", ar: "أحب تلقي رسائل نصية عشوائية تحمل مشاعر الود." } },
            { category: "Words", text: { en: "Compliments make my day conformable.", ar: "المجاملات تجعل يومي أفضل." } },
            { category: "Words", text: { en: "I like hearing 'I love you' often.", ar: "أحب سماع 'أحبك' كثيراً." } },
            { category: "Words", text: { en: "Insults hurt me deeply.", ar: "الإهانات تجرحني بعمق." } },
            { category: "Words", text: { en: "I encourage my partner with words.", ar: "أشجع شريكي بالكلمات." } },
            { category: "Words", text: { en: "I feel good when someone acknowledges my achievements.", ar: "أشعر بالرضا عندما يعترف شخص ما بإنجازاتي." } },
            { category: "Words", text: { en: "Encouraging words are important to me.", ar: "الكلمات المشجعة مهمة بالنسبة لي." } },
            { category: "Words", text: { en: "I love love notes.", ar: "أحب ملاحظات الحب." } },
            { category: "Words", text: { en: "Silence hurts more than anything.", ar: "الصمت يؤذي أكثر من أي شيء." } },

            // Acts of Service
            { category: "Acts", text: { en: "I feel loved when my partner helps me with chores.", ar: "أشعر بالحب عندما يساعدني شريكي في الأعمال المنزلية." } },
            { category: "Acts", text: { en: "Actions speak louder than words.", ar: "الأفعال أبلغ من الأقوال." } },
            { category: "Acts", text: { en: "I love it when someone does something for me without asking.", ar: "أحب عندما يفعل شخص ما شيئاً لي دون أن أطلب." } },
            { category: "Acts", text: { en: "I feel cared for when my car/house is fixed.", ar: "أشعر بالاهتمام عندما يتم إصلاح سيارتي/منزلي." } },
            { category: "Acts", text: { en: "Laziness is a major turn-off.", ar: "الكسل ينفرني بشدة." } },
            { category: "Acts", text: { en: "I appreciate practical help more than gifts.", ar: "أقدر المساعدة العملية أكثر من الهدايا." } },
            { category: "Acts", text: { en: "I feel loved when my partner runs errands for me.", ar: "أشعر بالحب عندما يقوم شريكي بقضاء المشاوير لي." } },
            { category: "Acts", text: { en: "Broken promises to do things hurt me.", ar: "الوعود الكاذبة بفعل الأشياء تؤذيني." } },
            { category: "Acts", text: { en: "I alleviate my partner's burden as a sign of love.", ar: "أخفف العبء عن شريكي كعلامة على الحب." } },
            { category: "Acts", text: { en: "I like it when dinner is ready when I get home.", ar: "أحب أن يكون العشاء جاهزاً عند عودتي للمنزل." } },

            // Receiving Gifts
            { category: "Gifts", text: { en: "I cherish gifts and keepsakes.", ar: "أعتز بالهدايا والتذكارات." } },
            { category: "Gifts", text: { en: "A thoughtful gift shows me I was thinking of.", ar: "الهدية المدروسة تظهر لي أنني كنت في البال." } },
            { category: "Gifts", text: { en: "I remember exactly who gave me what.", ar: "أتذكر بالضبط من أعطاني ماذا." } },
            { category: "Gifts", text: { en: "Forgetting my birthday is a disaster.", ar: "نسيان عيد ميلادي كارثة." } },
            { category: "Gifts", text: { en: "Gifts are visual symbols of love.", ar: "الهدايا رموز بصرية للحب." } },
            { category: "Gifts", text: { en: "I put a lot of effort into giving gifts.", ar: "أبذل جهداً كبيراً في تقديم الهدايا." } },
            { category: "Gifts", text: { en: "I feel unloved if I don't receive a gift on special occasions.", ar: "أشعر بعدم الحب إذا لم أتلق هدية في المناسبات الخاصة." } },
            { category: "Gifts", text: { en: "Small tokens mean a lot to me.", ar: "الرموز الصغيرة تعني لي الكثير." } },
            { category: "Gifts", text: { en: "Price doesn't matter, effort does.", ar: "السعر لا يهم، الجهد هو المهم." } },
            { category: "Gifts", text: { en: "I like bringing back souvenirs.", ar: "أحب إحضار الهدايا التذكارية." } },

            // Quality Time
            { category: "Time", text: { en: "I love uninterrupted conversation.", ar: "أحب المحادثات غير المنقطعة." } },
            { category: "Time", text: { en: "I feel loved when we do activities together.", ar: "أشعر بالحب عندما نقوم بأنشطة معاً." } },
            { category: "Time", text: { en: "Distractions (like phones) annoy me during our time.", ar: "المشتتات (مثل الهواتف) تزعجني خلال وقتنا." } },
            { category: "Time", text: { en: "I value eye contact.", ar: "أقدر التواصل البصري." } },
            { category: "Time", text: { en: "I feel lonely even when we are in the same room if we don't talk.", ar: "أشعر بالوحدة حتى ونحن في نفس الغرفة إذا لم نتحدث." } },
            { category: "Time", text: { en: "Shared experiences are essential.", ar: "التجارب المشتركة ضرورية." } },
            { category: "Time", text: { en: "I like weekend getaways.", ar: "أحب عطلات نهاية الأسبوع." } },
            { category: "Time", text: { en: "Taking a walk together is my ideal date.", ar: "المشي معاً هو موعدي المثالي." } },
            { category: "Time", text: { en: "I need full attention.", ar: "أحتاج إلى انتباه كامل." } },
            { category: "Time", text: { en: "Canceling a date hurts me deeply.", ar: "إلغاء الموعد يجرحني بعمق." } },

            // Physical Touch
            { category: "Touch", text: { en: "I love holding hands.", ar: "أحب تشابك الأيدي." } },
            { category: "Touch", text: { en: "Hugs make me feel secure.", ar: "العناق يجعلني أشعر بالأمان." } },
            { category: "Touch", text: { en: "I need physical proximity.", ar: "أحتاج للقرب الجسدي." } },
            { category: "Touch", text: { en: "I feel rejected if my partner pulls away.", ar: "أشعر بالرفض إذا ابتعد شريكي." } },
            { category: "Touch", text: { en: "A back rub means a lot more than words.", ar: "تدليك الظهر يعني أكثر بكثير من الكلمات." } },
            { category: "Touch", text: { en: "I am very 'touchy-feely'.", ar: "أنا شخص 'عاطفي جسدياً'." } },
            { category: "Touch", text: { en: "Physical neglect is unforgivable.", ar: "الإهمال الجسدي لا يغتفر." } },
            { category: "Touch", text: { en: "I crave intimacy constantly.", ar: "أتوق للحميمية باستمرار." } },
            { category: "Touch", text: { en: "Sitting close together is important.", ar: "الجلوس بالقرب من بعضنا البعض مهم." } },
            { category: "Touch", text: { en: "Touch is my primary way of connecting.", ar: "اللمس هو طريقتي الأساسية للتواصل." } }
        ];

        let scores = { "Words": 0, "Acts": 0, "Gifts": 0, "Time": 0, "Touch": 0 };
        let currentQuestionIndex = 0;
        let shuffledQuestions = [];
        let answerHistory = [];

        function init() {
            window.handleLanguageChange = (lang) => {
                currentLang = lang;
                updateText();
                if (currentQuestionIndex < 50) renderQuestion();
                else renderChart();
            };
            shuffleArray(questions);
            shuffledQuestions = questions;
        }

        function updateText() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) el.innerHTML = translations[currentLang][key];
            });
        }

        function startQuiz() {
            document.getElementById('page-home').classList.add('hidden');
            document.getElementById('page-quiz').classList.remove('hidden');
            scores = { "Words": 0, "Acts": 0, "Gifts": 0, "Time": 0, "Touch": 0 };
            currentQuestionIndex = 0;
            renderOptions();
            renderQuestion();
        }

        function renderOptions() {
            const container = document.getElementById('options-container');
            const labels = [1, 2, 3, 4, 5];
            const t = translations[currentLang];
            const textLabels = [t.option_1, t.option_2, t.option_3, t.option_4, t.option_5];

            container.innerHTML = labels.map((val, idx) => `
                <button onclick="handleAnswer(${val})" class="btn-option w-full p-4 rounded-xl bg-slate-800/50 border border-slate-700 hover:border-pink-500 text-start flex items-center group transition-all">
                    <span class="w-8 h-8 rounded-full border-2 border-slate-600 group-hover:border-pink-500 me-4 flex items-center justify-center text-xs text-slate-500 group-hover:text-pink-500 font-bold">${val}</span>
                    <span class="text-slate-300 group-hover:text-white font-medium">${textLabels[idx]}</span>
                </button>
            `).join('');
        }

        function renderQuestion() {
            const q = shuffledQuestions[currentQuestionIndex];
            const catName = categoriesTrans[q.category][currentLang];
            document.getElementById('question-category').innerText = catName;
            document.getElementById('question-text').innerText = q.text[currentLang];

            const progress = ((currentQuestionIndex) / 50) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('question-tracker').innerText = `${currentQuestionIndex + 1} / 50`;

            if (currentQuestionIndex > 0) document.getElementById('btn-back').classList.remove('hidden');
            else document.getElementById('btn-back').classList.add('hidden');
        }

        function handleAnswer(val) {
            const q = shuffledQuestions[currentQuestionIndex];
            // Simple additive scoring
            scores[q.category] += val;
            answerHistory.push(val);

            currentQuestionIndex++;
            if (currentQuestionIndex < 50) renderQuestion();
            else showResult();
        }

        function goBack() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                const lastScore = answerHistory.pop();
                const q = shuffledQuestions[currentQuestionIndex];
                scores[q.category] -= lastScore;
                renderQuestion();
            }
        }

        function showResult() {
            document.getElementById('page-quiz').classList.add('hidden');
            document.getElementById('page-result').classList.remove('hidden');
            renderChart();
        }

        function renderChart() {
            const ctx = document.getElementById('radarChart').getContext('2d');
            const labels = Object.keys(scores).map(k => categoriesTrans[k][currentLang]);

            // Normalize: 10 items * 5 = 50 max.
            const data = Object.keys(scores).map(k => (scores[k] / 50) * 100);

            if (window.myRadarChart) window.myRadarChart.destroy();
            const fontFamily = currentLang === 'ar' ? "'Cairo', sans-serif" : "'Inter', sans-serif";

            window.myRadarChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: currentLang === 'en' ? 'Affinity' : 'الرغبة',
                        data: data,
                        backgroundColor: 'rgba(236, 72, 153, 0.4)',
                        borderColor: '#ec4899',
                        pointBackgroundColor: '#fff',
                        borderWidth: 2
                    }]
                },
                options: {
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255,255,255,0.1)' },
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            pointLabels: { color: '#cbd5e1', font: { size: 12, family: fontFamily } },
                            ticks: { display: false, max: 100, min: 0 }
                        }
                    },
                    plugins: { legend: { labels: { font: { family: fontFamily } } } }
                }
            });

            const statsGrid = document.getElementById('stats-grid');
            let maxScore = -1;
            let maxKey = '';

            statsGrid.innerHTML = Object.keys(scores).map(k => {
                const pct = Math.round((scores[k] / 50) * 100);
                if (scores[k] > maxScore) { maxScore = scores[k]; maxKey = k; }
                const name = categoriesTrans[k][currentLang];
                return `
                 <div class="flex items-center justify-between group">
                    <span class="text-sm font-semibold text-slate-300 w-32 truncate">${name}</span>
                    <div class="flex-1 mx-3 h-2 bg-slate-700 rounded-full overflow-hidden">
                        <div class="h-full rounded-full bg-pink-500" style="width: ${pct}%"></div>
                    </div>
                    <span class="text-sm font-bold text-white w-10 text-end">${pct}%</span>
                </div>
                `;
            }).join('');

            document.getElementById('dominant-msg').innerText =
                (currentLang === 'en' ? "Your primary love language is " : "لغة الحب الأساسية لديك هي ") +
                categoriesTrans[maxKey][currentLang];
        }

        function shareResult(platform) {
            const url = encodeURIComponent(window.location.href);
            const text = currentLang === 'en' ? "My Love Language Result:" : "نتيجتي في اختبار لغات الحب:";
            let shareUrl = '';
            if (platform === 'wa') shareUrl = `https://api.whatsapp.com/send?text=${text} ${url}`;
            window.open(shareUrl, '_blank');
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        init();
    </script>
</body>


</html>
