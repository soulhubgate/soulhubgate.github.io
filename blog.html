<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library | Soul-Hub</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Cairo:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
        }

        html[lang="ar"] body {
            font-family: 'Cairo', sans-serif;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        @keyframes blob {
            0% {
                transform: translate(0px, 0px) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }

            100% {
                transform: translate(0px, 0px) scale(1);
            }
        }

        .animate-blob {
            animation: blob 7s infinite;
        }

        .animation-delay-2000 {
            animation-delay: 2s;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0f172a;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body
    class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-900 via-indigo-900 to-slate-900">

    <div id="app-container"
        class="w-full max-w-6xl glass-panel rounded-2xl flex flex-col relative overflow-hidden h-[90vh]">
        <div
            class="absolute top-0 left-0 w-32 h-32 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-blob pointer-events-none">
        </div>
        <div
            class="absolute top-0 right-0 w-32 h-32 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-blob animation-delay-2000 pointer-events-none">
        </div>

        <div id="nav-placeholder"></div>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-6 md:p-10 relative">

            <div class="text-center mb-12 fade-in">
                <h1 class="text-4xl font-extrabold text-white mb-4" data-i18n="nav_library">Psychology Library</h1>
                <p class="text-slate-400 max-w-2xl mx-auto">Explore in-depth articles about personality, emotions, and
                    relationships.</p>
            </div>

            <!-- Filter (Optional, added simply) -->
            <div class="flex flex-wrap gap-2 justify-center mb-8 fade-in">
                <button onclick="renderArticles('all')"
                    class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm transition-colors text-white">All</button>
                <button onclick="renderArticles('mbti')"
                    class="px-4 py-2 bg-emerald-900/50 hover:bg-emerald-800/50 border border-emerald-500/30 text-emerald-300 rounded-lg text-sm transition-colors">MBTI</button>
                <button onclick="renderArticles('love')"
                    class="px-4 py-2 bg-pink-900/50 hover:bg-pink-800/50 border border-pink-500/30 text-pink-300 rounded-lg text-sm transition-colors">Love</button>
                <button onclick="renderArticles('clinical')"
                    class="px-4 py-2 bg-indigo-900/50 hover:bg-indigo-800/50 border border-indigo-500/30 text-indigo-300 rounded-lg text-sm transition-colors">Clinical</button>
            </div>

            <div id="articles-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Data from articles.js -->
            </div>

        </div>
    </div>

    <!-- Article Modal -->
    <div id="article-modal"
        class="fixed inset-0 z-50 hidden bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-4">
        <div
            class="bg-slate-800 w-full max-w-3xl max-h-[85vh] rounded-2xl border border-slate-700 shadow-2xl flex flex-col relative">
            <button onclick="closeModal()"
                class="absolute top-4 right-4 text-slate-400 hover:text-white text-2xl z-10 w-10 h-10 flex items-center justify-center bg-slate-700/50 rounded-full transition-colors">
                &times;
            </button>
            <div class="p-8 overflow-y-auto custom-scrollbar">
                <h2 id="modal-title" class="text-3xl font-bold text-white mb-6"></h2>
                <div id="modal-content" class="prose prose-invert prose-lg max-w-none text-slate-300"></div>
            </div>
            <div class="p-4 border-t border-slate-700 bg-slate-800 rounded-b-2xl">
                <button onclick="closeModal()" id="modal-back-btn"
                    class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl transition-all">Close</button>
            </div>
        </div>
    </div>

    <script src="js/translations.js"></script>
    <script src="js/articles.js"></script>
    <script src="js/main.js"></script>
    <script>
        function init() {
            window.handleLanguageChange = (lang) => {
                currentLang = lang;
                updateText();
                renderArticles('all');
            };
            renderArticles('all');
        }

        function updateText() {
            const t = translations[currentLang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.innerHTML = t[key];
            });
        }

        function renderArticles(filter) {
            const grid = document.getElementById('articles-grid');
            grid.innerHTML = '';

            articles.forEach(article => {
                if (filter !== 'all' && article.category !== filter) return;

                const card = document.createElement('div');
                card.className = 'glass-panel p-6 rounded-2xl flex flex-col hover:bg-slate-800/50 transition-all cursor-pointer group fade-in border border-slate-700/50 hover:border-indigo-500/50';
                card.onclick = () => openArticle(article);

                // Colors based on category
                let colorClass = 'text-indigo-400';
                if (article.category === 'mbti') colorClass = 'text-emerald-400';
                if (article.category === 'love') colorClass = 'text-pink-400';
                if (article.category === 'eq') colorClass = 'text-yellow-400';
                if (article.category === 'dark') colorClass = 'text-gray-400';
                if (article.category === 'attachment') colorClass = 'text-red-400';
                if (article.category === 'career') colorClass = 'text-orange-400';

                // Handle missing summary
                const sum = article.summary ? article.summary[currentLang] : "Click to read more.";

                card.innerHTML = `
                    <div class="mb-4 ${colorClass} text-sm font-bold uppercase tracking-wider">${article.category.toUpperCase()}</div>
                    <h3 class="text-xl font-bold text-white mb-3 group-hover:text-indigo-300 transition-colors">${article.title[currentLang]}</h3>
                    <p class="text-slate-400 text-sm flex-grow leading-relaxed">${sum}</p>
                    <div class="mt-4 pt-4 border-t border-slate-700/50 flex justify-between items-center">
                        <span class="text-xs text-slate-500">Read more</span>
                        <i class="fas fa-arrow-right ${colorClass} rtl:rotate-180"></i>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openArticle(article) {
            document.getElementById('modal-title').innerText = article.title[currentLang];
            document.getElementById('modal-content').innerHTML = article.content[currentLang];

            // Back button text
            const backText = currentLang === 'ar' ? 'العودة' : 'Back';
            document.getElementById('modal-back-btn').innerText = backText;

            document.getElementById('article-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('article-modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Close on BG click
        document.getElementById('article-modal').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        init();
    </script>
</body>

</html>
