<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Triad Test | Soul-Hub</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Cairo:wght@400;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
        }

        html[lang="ar"] body {
            font-family: 'Cairo', sans-serif;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        @keyframes blob {
            0% {
                transform: translate(0px, 0px) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }

            100% {
                transform: translate(0px, 0px) scale(1);
            }
        }

        .animate-blob {
            animation: blob 7s infinite;
        }

        .animation-delay-2000 {
            animation-delay: 2s;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0f172a;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body
    class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-900 via-gray-900 to-slate-900">

    <div id="app-container"
        class="w-full max-w-5xl glass-panel rounded-2xl flex flex-col relative overflow-hidden h-[90vh]">
        <div
            class="absolute top-0 left-0 w-32 h-32 bg-gray-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-blob pointer-events-none">
        </div>
        <div
            class="absolute top-0 right-0 w-32 h-32 bg-slate-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-blob animation-delay-2000 pointer-events-none">
        </div>

        <div id="nav-placeholder"></div>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-6 md:p-10 relative">

            <div id="page-home" class="text-center mt-12 fade-in">
                <div class="mb-6 inline-block p-4 rounded-full bg-gray-500/20 text-gray-300">
                    <i class="fas fa-mask text-5xl"></i>
                </div>
                <h1 class="text-4xl md:text-5xl font-extrabold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-gray-300 to-slate-300"
                    data-i18n="card_dark_title">
                    Dark Triad Test
                </h1>
                <p class="text-lg text-slate-300 mb-10 max-w-lg mx-auto leading-relaxed" data-i18n="card_dark_desc">
                    Explore the darker side of personality: Machiavellianism (strategic manipulation), Narcissism
                    (ego-centricity), and Psychopathy (impulsivity/callousness).
                </p>
                <button onclick="startQuiz()"
                    class="px-8 py-4 bg-gray-600 hover:bg-gray-500 text-white font-bold rounded-xl shadow-lg shadow-gray-500/30 transition-all transform hover:scale-105"
                    data-i18n="btn_start">
                    Begin Assessment
                </button>
            </div>

            <div id="page-quiz" class="hidden fade-in max-w-2xl mx-auto mt-4">
                <div class="flex justify-between text-xs text-slate-400 mb-2 uppercase tracking-wide">
                    <span data-i18n="progress">Progress</span>
                    <span id="question-tracker">1 / 50</span>
                </div>
                <div class="w-full bg-slate-700 h-2 rounded-full mb-8 overflow-hidden">
                    <div id="progress-bar"
                        class="bg-gradient-to-r from-gray-500 to-slate-500 h-2 rounded-full transition-all duration-300"
                        style="width: 0%"></div>
                </div>

                <div class="mb-2 text-center">
                    <span id="question-category"
                        class="text-xs font-bold text-gray-400 tracking-widest uppercase bg-gray-900/30 px-3 py-1 rounded-full">Dimension</span>
                </div>

                <h2 id="question-text"
                    class="text-2xl md:text-3xl font-bold text-white text-center mb-10 min-h-[100px] flex items-center justify-center">
                    Loading...
                </h2>

                <div id="options-container" class="space-y-3"></div>

                <div class="flex justify-between mt-8">
                    <button id="btn-back" onclick="goBack()"
                        class="px-6 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-slate-300 text-sm hidden"
                        data-i18n="btn_back">
                        <i class="fas fa-arrow-left mr-2 rtl:rotate-180"></i> Back
                    </button>
                </div>
            </div>

            <div id="page-result" class="hidden fade-in w-full">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                    <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700">
                        <h2 class="text-2xl font-bold text-white mb-6 flex items-center gap-3">
                            <i class="fas fa-chart-pie text-gray-400"></i> Dark Personality Profile
                        </h2>
                        <canvas id="radarChart" class="w-full max-h-[400px]"></canvas>
                        <div class="mt-6 flex gap-4">
                            <button onclick="shareResult('wa')"
                                class="flex-1 py-3 bg-green-600 hover:bg-green-500 rounded-xl text-white font-bold transition-all"><i
                                    class="fab fa-whatsapp"></i> WhatsApp</button>
                            <button onclick="shareResult('tw')"
                                class="flex-1 py-3 bg-sky-500 hover:bg-sky-400 rounded-xl text-white font-bold transition-all"><i
                                    class="fab fa-twitter"></i> Twitter</button>
                        </div>
                    </div>
                    <div class="space-y-6">
                        <div class="bg-slate-800/30 p-6 rounded-xl border border-slate-700/50">
                            <h3 class="text-xl font-bold text-white mb-4">Detailed Breakdown</h3>
                            <div id="stats-grid" class="space-y-4"></div>
                        </div>
                        <div class="flex flex-col gap-4">
                            <a href="blog.html"
                                class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl text-center shadow-lg shadow-indigo-500/20 transition-all">Read
                                Full Analysis in Library</a>
                            <button onclick="location.reload()"
                                class="w-full py-4 bg-slate-700 hover:bg-slate-600 text-slate-200 font-bold rounded-xl transition-all">Retake
                                Test</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="js/translations.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Dimensions: MAC (Machiavellianism), NAR (Narcissism), PSY (Psychopathy)

        const categoriesTrans = {
            "MAC": { en: "Machiavellianism", ar: "الميكافيلية" },
            "NAR": { en: "Narcissism", ar: "النرجسية" },
            "PSY": { en: "Psychopathy", ar: "الاعتلال النفسي" }
        };

        // 50 Qs. Approx 16-17 per dimension.
        const questions = [
            // Machiavellianism (Strategic manipulation)
            { category: "MAC", text: { en: "It is wise to keep track of information that you can use against people later.", ar: "من الحكمة الاحتفاظ بمعلومات يمكن استخدامها ضد الناس لاحقاً." } },
            { category: "MAC", text: { en: "You should wait for the right time to get back at people.", ar: "عليك انتظار الوقت المناسب للانتقام من الناس." } },
            { category: "MAC", text: { en: "I make sure my plans benefit myself, not others.", ar: "أتأكد من أن خططي تفيدني أنا، وليس الآخرين." } },
            { category: "MAC", text: { en: "Most people can be manipulated.", ar: "يمكن التلاعب بمعظم الناس." } },
            { category: "MAC", text: { en: "People are only altruistic because they want something.", ar: "الناس يؤثرون على أنفسهم فقط لأنهم يريدون شيئاً." } },
            { category: "MAC", text: { en: "You should not trust anyone completely.", ar: "لا يجب أن تثق بأي شخص ثقة عمياء." } },
            { category: "MAC", text: { en: "I like to use clever tactics to get my way.", ar: "أحب استخدام تكتيكات ذكية للحصول على ما أريد." } },
            { category: "MAC", text: { en: "It is better to be feared than loved.", ar: "من الأفضل أن يخشاك الناس على أن يحبوك." } },
            { category: "MAC", text: { en: "I manipulate others to get what I want.", ar: "أتلاعب بالآخرين للحصول على ما أريد." } },
            { category: "MAC", text: { en: "I check if people are useful to me before creating a friendship.", ar: "أتحقق ما إذا كان الناس مفيدين لي قبل تكوين صداقة." } },

            { category: "MAC", text: { en: "Honesty is not always the best policy.", ar: "الصدق ليس دائماً أفضل سياسة." } },
            { category: "MAC", text: { en: "I tend to exploit others towards my own end.", ar: "أميل لاستغلال الآخرين لتحقيق غاياتي." } },
            { category: "MAC", text: { en: "I can talk my way out of anything.", ar: "أستطيع التملص من أي شيء بالكلام." } },
            { category: "MAC", text: { en: "I filter what I say to control how others see me.", ar: "أنقي ما أقوله للتحكم في كيفية رؤية الآخرين لي." } },
            { category: "MAC", text: { en: "I am willing to cut corners to succeed.", ar: "أنا مستعد لاتباع طرق مختصرة للنجاح." } },
            { category: "MAC", text: { en: "Power is more important than fairness.", ar: "القوة أهم من العدالة." } },

            // Narcissism (Already in clinical, but this is specific to this test)
            { category: "NAR", text: { en: "I like to be the center of attention.", ar: "أحب أن أكون محط الأنظار." } },
            { category: "NAR", text: { en: "I deserve more privileges than others.", ar: "أستحق امتيازات أكثر من الآخرين." } },
            { category: "NAR", text: { en: "I am special.", ar: "أنا شخص مميز." } },
            { category: "NAR", text: { en: "I know that I am superior because everyone tells me so.", ar: "أعرف أنني متفوق لأن الجميع يخبرني بذلك." } },
            { category: "NAR", text: { en: "People see me as a natural leader.", ar: "يراي الناس كقائد بالفطرة." } },
            { category: "NAR", text: { en: "I insist on getting the respect I deserve.", ar: "أصر على الحصول على الاحترام الذي أستحقه." } },
            { category: "NAR", text: { en: "I like to show off my body/intellect.", ar: "أحب استعراض جسدي/ذكائي." } },
            { category: "NAR", text: { en: "I get upset if people don't notice my achievements.", ar: "أنزعج إذا لم يلاحظ الناس إنجازاتي." } },
            { category: "NAR", text: { en: "I am destined to be famous.", ar: "مقدر لي أن أكون مشهوراً." } },
            { category: "NAR", text: { en: "I only associate with high-status people.", ar: "لا أخالط إلا ذوي المكانة العالية." } },

            { category: "NAR", text: { en: "I require excessive admiration.", ar: "أطلب إعجاباً مفرطاً." } },
            { category: "NAR", text: { en: "I have a sense of entitlement.", ar: "لدي شعور بالاستحقاق." } },
            { category: "NAR", text: { en: "I am envious of others.", ar: "أحسد الآخرين." } },
            { category: "NAR", text: { en: "I am arrogant.", ar: "أنا متغطرس." } },
            { category: "NAR", text: { en: "I believe others are envious of me.", ar: "أعتقد أن الآخرين يحسدونني." } },
            { category: "NAR", text: { en: "I often look at myself in the mirror.", ar: "غالباً ما أنظر لنفسي في المرآة." } },
            { category: "NAR", text: { en: "I am an extraordinary person.", ar: "أنا شخص استثنائي." } },

            // Psychopathy (Callousness, Impulsivity)
            { category: "PSY", text: { en: "I don't have much empathy for others.", ar: "ليس لدي الكثير من التعاطف مع الآخرين." } },
            { category: "PSY", text: { en: "Payback needs to be quick and nasty.", ar: "الانتقام يجب أن يكون سريعاً وقاسياً." } },
            { category: "PSY", text: { en: "I like to get revenge on authorities.", ar: "أحب الانتقام من السلطات." } },
            { category: "PSY", text: { en: "I act on impulse.", ar: "أتصرف بتهور." } },
            { category: "PSY", text: { en: "I enjoy taking risks.", ar: "أستمتع بالمخاطرة." } },
            { category: "PSY", text: { en: "People who get messed with usually deserve it.", ar: "الأشخاص الذين يتعرضون للأذى عادة يستحقون ذلك." } },
            { category: "PSY", text: { en: "I can turn off my guilt switch.", ar: "أستطيع إيقاف شعوري بالذنب." } },
            { category: "PSY", text: { en: "I don't care if I hurt people's feelings.", ar: "لا أهتم إذا جرحت مشاعر الناس." } },
            { category: "PSY", text: { en: "I'll say anything to get what I want.", ar: "سأقول أي شيء للحصول على ما أريد." } },
            { category: "PSY", text: { en: "I never feel remorse.", ar: "لا أشعر بالندم أبداً." } },

            { category: "PSY", text: { en: "I avoid dangerous situations. (Reverse)", ar: "أتجنب المواقف الخطرة. (عكسي)" }, reverse: true },
            { category: "PSY", text: { en: "I think about the consequences of my actions. (Reverse)", ar: "أفكر في عواقب أفعالي. (عكسي)" }, reverse: true },
            { category: "PSY", text: { en: "I am sensitive to others' pain. (Reverse)", ar: "أنا حساس لألم الآخرين. (عكسي)" }, reverse: true },
            { category: "PSY", text: { en: "I follow the rules. (Reverse)", ar: "أتبع القواعد. (عكسي)" }, reverse: true },
            { category: "PSY", text: { en: "I apologize sincerely. (Reverse)", ar: "أعتذر بصدق. (عكسي)" }, reverse: true },
            { category: "PSY", text: { en: "I am a very cautious person. (Reverse)", ar: "أنا شخص حذر جداً. (عكسي)" }, reverse: true },
            { category: "PSY", text: { en: "I worry about getting caught. (Reverse)", ar: "أقلق من أن يتم الإمساك بي. (عكسي)" }, reverse: true }
        ];

        let scores = { "MAC": 0, "NAR": 0, "PSY": 0 };
        let currentQuestionIndex = 0;
        let shuffledQuestions = [];
        let answerHistory = [];

        function init() {
            window.handleLanguageChange = (lang) => {
                currentLang = lang;
                updateText();
                if (currentQuestionIndex < 50) renderQuestion();
                else renderChart();
            };
            shuffleArray(questions);
            shuffledQuestions = questions;
        }

        function updateText() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) el.innerHTML = translations[currentLang][key];
            });
        }

        function startQuiz() {
            document.getElementById('page-home').classList.add('hidden');
            document.getElementById('page-quiz').classList.remove('hidden');
            scores = { "MAC": 0, "NAR": 0, "PSY": 0 };
            currentQuestionIndex = 0;
            renderOptions();
            renderQuestion();
        }

        function renderOptions() {
            const container = document.getElementById('options-container');
            const labels = [1, 2, 3, 4, 5];
            const t = translations[currentLang];
            const textLabels = [t.option_1, t.option_2, t.option_3, t.option_4, t.option_5];

            container.innerHTML = labels.map((val, idx) => `
                <button onclick="handleAnswer(${val})" class="btn-option w-full p-4 rounded-xl bg-slate-800/50 border border-slate-700 hover:border-gray-500 text-start flex items-center group transition-all">
                    <span class="w-8 h-8 rounded-full border-2 border-slate-600 group-hover:border-gray-500 me-4 flex items-center justify-center text-xs text-slate-500 group-hover:text-gray-500 font-bold">${val}</span>
                    <span class="text-slate-300 group-hover:text-white font-medium">${textLabels[idx]}</span>
                </button>
            `).join('');
        }

        function renderQuestion() {
            const q = shuffledQuestions[currentQuestionIndex];
            const catName = categoriesTrans[q.category][currentLang];
            document.getElementById('question-category').innerText = catName;
            document.getElementById('question-text').innerText = q.text[currentLang];

            const progress = ((currentQuestionIndex) / 50) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('question-tracker').innerText = `${currentQuestionIndex + 1} / 50`;

            if (currentQuestionIndex > 0) document.getElementById('btn-back').classList.remove('hidden');
            else document.getElementById('btn-back').classList.add('hidden');
        }

        function handleAnswer(val) {
            const q = shuffledQuestions[currentQuestionIndex];
            let score = val;
            if (q.reverse) score = 6 - val;

            scores[q.category] += score;
            answerHistory.push(score);

            currentQuestionIndex++;
            if (currentQuestionIndex < 50) renderQuestion();
            else showResult();
        }

        function goBack() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                const lastScore = answerHistory.pop();
                const q = shuffledQuestions[currentQuestionIndex];
                scores[q.category] -= lastScore;
                renderQuestion();
            }
        }

        function showResult() {
            document.getElementById('page-quiz').classList.add('hidden');
            document.getElementById('page-result').classList.remove('hidden');
            renderChart();
        }

        function renderChart() {
            const ctx = document.getElementById('radarChart').getContext('2d');
            const labels = Object.keys(scores).map(k => categoriesTrans[k][currentLang]);

            // Normalize approx based on item count. (16 items * 5 = 80 max). 
            // We just use raw mapping to 100 for visual consistency.
            // Let's assume max possible score per trait is roughly ~85. 
            // Simplified normalization: score / (numItems * 5) * 100.
            // MAC: 16 items. NAR: 17 items. PSY: 17 items.

            const data = [
                (scores.MAC / (16 * 5)) * 100,
                (scores.NAR / (17 * 5)) * 100,
                (scores.PSY / (17 * 5)) * 100
            ];

            if (window.myRadarChart) window.myRadarChart.destroy();
            const fontFamily = currentLang === 'ar' ? "'Cairo', sans-serif" : "'Inter', sans-serif";

            window.myRadarChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: currentLang === 'en' ? 'Dark Traits' : 'السمات المظلمة',
                        data: data,
                        backgroundColor: 'rgba(100, 116, 139, 0.4)',
                        borderColor: '#64748b',
                        pointBackgroundColor: '#fff',
                        borderWidth: 2
                    }]
                },
                options: {
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255,255,255,0.1)' },
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            pointLabels: { color: '#cbd5e1', font: { size: 12, family: fontFamily } },
                            ticks: { display: false, max: 100, min: 0 }
                        }
                    },
                    plugins: { legend: { labels: { font: { family: fontFamily } } } }
                }
            });

            const statsGrid = document.getElementById('stats-grid');
            statsGrid.innerHTML = labels.map((name, i) => {
                const pct = Math.round(data[i]);
                return `
                 <div class="flex items-center justify-between group">
                    <span class="text-sm font-semibold text-slate-300 w-32 truncate">${name}</span>
                    <div class="flex-1 mx-3 h-2 bg-slate-700 rounded-full overflow-hidden">
                        <div class="h-full rounded-full bg-gray-500" style="width: ${pct}%"></div>
                    </div>
                    <span class="text-sm font-bold text-white w-10 text-end">${pct}%</span>
                </div>
                `;
            }).join('');
        }

        function shareResult(platform) {
            const url = encodeURIComponent(window.location.href);
            const text = currentLang === 'en' ? "My Dark Triad Result:" : "نتيجتي في اختبار الثالوث المظلم:";
            let shareUrl = '';
            if (platform === 'wa') shareUrl = `https://api.whatsapp.com/send?text=${text} ${url}`;
            if (platform === 'tw') shareUrl = `https://twitter.com/intent/tweet?text=${text}&url=${url}`;
            window.open(shareUrl, '_blank');
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        init();
    </script>
</body>

</html>
